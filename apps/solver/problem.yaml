solver: trilinos
# solver: petsc
# solver: gmres
# solver: amgsolver
matrix:
    type: diagonal
    # type: preconditioner
    # type: fromfile
    # filename: flow_system.bin
    n: 250
    # random: true
    # off_diag_dominance: 1.001
    blk_ii: 1
    # blk_ii: 1
    blk_ij: 0
    # off_diagonal: 5

solver_lookup:
    gmres:
        family: GMRES
        min_iterations: 3
        max_iterations: 10
        rtol: 1.0e-9
        atol: 1.0e-16
        verbose: 2
        options:
            precond: amgprecond
            krylov_type: flexgmres
            krylov_dim: 20
            max_restart: 0
            precondition_type: right
            verbose: 2

    amgprecond:
        family: AMGSolver
        min_iterations: 3
        max_iterations: 20
        # rtol: 1.0e-15
        rtol: 1.0e-1
        atol: 1.0e-15
        verbose: 1
        options:
            cycle_type: V-Cycle
            smoother_type: ILU0
            # smoother_algorithm: none
            smoother_algorithm: orthomin
            orthomin_krylov_dim: 1
            # diagonal_dominance: 3.0
        agglomerator:
            max_levels: 12
            min_cv_agglomeration: 5
            max_cv_agglomeration: 9
            verbose: 0

    amgsolver:
        family: AMGSolver
        min_iterations: 3
        max_iterations: 1000
        rtol: 1.0e-09
        atol: 1.0e-20
        verbose: 5
        options:
            cycle_type: V-Cycle
            smoother_type: ILU0
            # smoother_algorithm: none
            smoother_algorithm: orthomin
            orthomin_krylov_dim: 1
            # diagonal_dominance: 3.0
        agglomerator:
            max_levels: 12
            min_cv_agglomeration: 5
            max_cv_agglomeration: 9
            verbose: 0

    trilinos:
        family: Trilinos
        min_iterations: 3
        max_iterations: 50
        rtol: 1.0e-9
        atol: 1.0e-16
        options:
            belos_solver: gmres
            preconditioner: ilu

    petsc:
        family: PETSc
        max_iterations: 1000
        rtol: 1.0e-09
        atol: 1.0e-20
        verbose: 5
        options:
            ksp_type: fgmres
            pc_type: bjacobi
            # pc_type: none

    hypre:
        family: HYPRE
        max_iterations: 10
        rtol: 1.0e-09
        atol: 1.0e-20
        options:
            solver:
              type: FlexGMRES
            # precond:
            #   type: BoomerAMG
            #   numRelaxSweeps: 3
            #   relaxType: 0
            #   strongThreshold: 0.7
            #   aggNumLevels: 2
            #   maxIter: 1
            #   cycleType: 1
            #   printlevel: 0
            #   coarsenType: 0
            #   tol: 1.0e-16
            #   # numPaths: 2
            #   # nodal: 1
            #   # numFunctions: 4

    hypre_mgr:
        family: HYPRE
        max_iterations: 10
        rtol: 1.0e-09
        atol: 1.0e-20
        options:
            solver:
              type: FlexGMRES
              # printlevel: 1
              kdim: 20
            precond:
              type: MGR
              CpointsByBlock:
                blocksize: 4
                n_levels: 3
                level_0: [1, 2, 3]
                level_1: [2, 3]
                level_2: [3]
              nonCpointsToFpoints: 1
              truncateCoarseGridThreshold: 1.0e-8
              numRelaxSweeps: 3
              relaxType: 0
              # coarseGridMethod: [0, 0, 3]
              # levelFRelaxNumFunctions: [3, 2, 1]
              # levelRestrictType: [12, 12, 0]
              # levelFRelaxType: [0, 0, 0]
              # levelInterpType: [12, 12, 2]
              # levelSmoothType: [0, 0, 0]
              # levelSmoothIters: [1, 1, 1]
              strongThreshold: 0.7
              aggNumLevels: 2
              # maxIter: 1
              cycleType: 1
              # printlevel: 1
              # coarseGridPrintLevel: 1
              coarsenType: 0
              # interpType: 4
              # truncFactor: 1.0e-9
              # coarsenCutFactor: 2
              tol: 1.0e-16
              # truncFactor: 1.0e-7
              # maxRowSum: 0.7

    directLU:
        family: DirectLUSolver
